name: Market Report

on:
  schedule:
    - cron: '30 7 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Run Market Report Generator
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT:    ${{ secrets.REPORT_RECIPIENT }}
          WEB_APP_URL:         ${{ secrets.WEB_APP_URL }}
        run: python generate_report.py

      - name: Commit and push updated index.html
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Market Report Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 Market report update $(date +'%Y-%m-%d %H:%M')"
          git push
