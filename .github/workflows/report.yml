name: Market Report

on:
  schedule:
    # 9:30 CET = 7:30 UTC (winter) / 8:30 UTC (summer)
    # Using 7:30 UTC — adjust to 8:30 UTC in summer if needed
    - cron: '30 7 * * 1-5'   # 09:30 CET weekdays (winter)
    - cron: '0 13 * * 1-5'   # 15:00 CET weekdays (winter)
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write             # Needed to push index.html to gh-pages

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Run Market Report Generator
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT:    ${{ secrets.REPORT_RECIPIENT }}
          WEB_APP_URL:         ${{ secrets.WEB_APP_URL }}
        run: python generate_report.py

      - name: Commit and push updated index.html
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Market Report Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 Market report update $(date +'%Y-%m-%d %H:%M')"
          git push

