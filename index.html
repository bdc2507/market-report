<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="900">
<title>Market Pulse</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f3; font-family: Arial, sans-serif; min-height: 100vh; }
  .container { max-width: 560px; margin: 0 auto; padding: 16px 16px 48px; }

  .header { background: #fff; border-bottom: 3px solid #b8860b; padding: 18px 20px 14px; margin-bottom: 3px; }
  .header-tag { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 3px; color: #b8860b; text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 20px; font-weight: 600; color: #111; }
  .header-date { font-family: 'Courier New', monospace; font-size: 11px; color: #888; margin-top: 3px; text-transform: capitalize; }

  .market-section { background: #fff; margin-bottom: 3px; padding: 0 12px 8px; }
  .category-header { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #888; padding: 14px 8px 5px; border-bottom: 1px solid #ddd; }

  .asset-row { display: grid; grid-template-columns: 30px minmax(0,1fr) auto; align-items: center; gap: 8px; padding: 13px 8px; border-bottom: 1px solid #eee; }
  .asset-row:last-child { border-bottom: none; }
  .asset-emoji { font-size: 18px; text-align: center; line-height: 1; }
  .asset-name { font-size: 14px; font-weight: 600; color: #111111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-price { font-family: 'Courier New', monospace; font-size: 11px; color: #888; margin-top: 2px; }
  .asset-pcts { text-align: right; }
  .pct-day { font-size: 17px; font-weight: 600; display: block; line-height: 1.2; white-space: nowrap; }
  .pct-sub { font-family: 'Courier New', monospace; font-size: 11px; display: block; margin-top: 3px; white-space: nowrap; color: #888; }
  .up   { color: #1a7a4a; }
  .down { color: #c0392b; }
  .flat { color: #888; }

  .commentary { background: #fffdf5; border-left: 3px solid #b8860b; padding: 16px 18px; margin-bottom: 3px; }
  .commentary-tag { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px; color: #b8860b; text-transform: uppercase; margin-bottom: 8px; }
  .commentary-text { font-size: 14px; line-height: 1.7; color: #111; font-style: italic; }

  .legend { padding: 10px 12px; }
  .legend-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .legend-text { font-family: 'Courier New', monospace; font-size: 10px; color: #aaa; }
  .refresh-btn { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 1px; color: #b8860b; background: none; border: 1px solid #ddd; padding: 5px 12px; cursor: pointer; text-transform: uppercase; }
  .refresh-btn:hover { border-color: #b8860b; }

  @media (max-width: 400px) {
    .asset-row { grid-template-columns: 26px minmax(0,1fr) auto; gap: 5px; }
    .pct-day { font-size: 15px; }
    .pct-sub { font-size: 10px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-tag">◈ Market Pulse</div>
    <div class="header-title" id="session-title">Caricamento…</div>
    <div class="header-date" id="report-date">—</div>
  </div>

  <div class="market-section" id="market-table">
    <div style="text-align:center; padding:40px; font-family:'Courier New',monospace; font-size:12px; letter-spacing:2px; color:#aaa;">
      CARICAMENTO DATI…
    </div>
  </div>

  <div class="commentary">
    <div class="commentary-tag">◈ Analisi AI</div>
    <div class="commentary-text" id="commentary-text">
      La web app si aggiorna automaticamente alle 09:30 e alle 15:00 nei giorni feriali.
    </div>
  </div>

  <div class="legend">
    <div class="legend-inner">
      <span class="legend-text">
        <span class="up">▲</span> rialzo &nbsp;|&nbsp;
        <span class="down">▼</span> ribasso &nbsp;|&nbsp;
        fonte: Yahoo Finance
      </span>
      <button class="refresh-btn" onclick="location.reload()">↻ Aggiorna</button>
    </div>
  </div>

</div>
<script>
const ASSETS = [
  { symbol: "^GSPC",    name: "S&P 500",      category: "📈 Azioni & ETF",   emoji: "🇺🇸" },
  { symbol: "IWDA.AS",  name: "MSCI World",   category: "📈 Azioni & ETF",   emoji: "🌍" },
  { symbol: "EIMI.MI",  name: "EIMI EM",      category: "📈 Azioni & ETF",   emoji: "🌏" },
  { symbol: "XDWT.DE",  name: "XDWT Tech",    category: "📈 Azioni & ETF",   emoji: "💻" },
  { symbol: "CL=F",     name: "Petrolio WTI", category: "🏭 Materie Prime",   emoji: "🛢️" },
  { symbol: "GC=F",     name: "Oro",          category: "🏭 Materie Prime",   emoji: "🥇" },
  { symbol: "SI=F",     name: "Argento",      category: "🏭 Materie Prime",   emoji: "🥈" },
  { symbol: "BTC-USD",  name: "Bitcoin",      category: "🔗 Crypto",         emoji: "₿"  },
  { symbol: "SOL-USD",  name: "Solana",       category: "🔗 Crypto",         emoji: "◎"  },
  { symbol: "EURUSD=X", name: "EUR/USD",      category: "💱 Forex & Macro",  emoji: "💶" },
  { symbol: "^TNX",     name: "Bond US 10Y",  category: "💱 Forex & Macro",  emoji: "📊" },
];

async function fetchQuote(symbol) {
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=1mo`;
  const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`;
  let data = null;
  try {
    const r = await fetch(yahooUrl);
    if (!r.ok) throw new Error(r.status);
    data = await r.json();
  } catch(e) {
    try {
      const r2 = await fetch(proxyUrl);
      if (!r2.ok) throw new Error(r2.status);
      data = await r2.json();
    } catch(e2) { return null; }
  }
  try {
    const result = data.chart.result[0];
    const meta = result.meta;
    const closes = result.indicators.quote[0].close.filter(c => c !== null);
    if (closes.length < 2) return null;
    const current  = meta.regularMarketPrice ?? closes.at(-1);
    const prevDay  = closes.at(-2);
    const weekAgo  = closes.length >= 6 ? closes.at(-6) : closes[0];
    const monthAgo = closes[0];
    const pct = (a, b) => b ? +((a - b) / b * 100).toFixed(2) : 0;
    return { symbol, current, currency: meta.currency || "",
      dayPct: pct(current, prevDay), weekPct: pct(current, weekAgo), monthPct: pct(current, monthAgo) };
  } catch(e) { return null; }
}

function cls(v) { return v === null ? "flat" : v > 0 ? "up" : v < 0 ? "down" : "flat"; }
function arrow(v, label="") {
  if (v === null) return `<span class="flat">– ${label}</span>`;
  const a = v > 0 ? "▲" : v < 0 ? "▼" : "→";
  const s = v > 0 ? "+" : "";
  return `<span class="${cls(v)}">${a} ${s}${v.toFixed(2)}%</span>${label ? ` <span style="color:#aaa">${label}</span>` : ""}`;
}
function formatPrice(val, cur) {
  if (!val) return "N/D";
  if (val > 10000) return `${val.toLocaleString("it-IT", {maximumFractionDigits:0})} ${cur}`;
  if (val > 100)   return `${val.toLocaleString("it-IT", {minimumFractionDigits:2, maximumFractionDigits:2})} ${cur}`;
  return `${val.toFixed(4)} ${cur}`;
}

function render(results) {
  const now = new Date();
  document.getElementById("session-title").textContent = now.getHours() < 13 ? "🌅 Apertura Mercati" : "🌆 Chiusura Mercati";
  document.getElementById("report-date").textContent = now.toLocaleString("it-IT", {
    weekday:"long", day:"2-digit", month:"long", year:"numeric", hour:"2-digit", minute:"2-digit"
  });

  const groups = {};
  ASSETS.forEach((a, i) => {
    if (!groups[a.category]) groups[a.category] = [];
    groups[a.category].push({ ...a, data: results[i] });
  });

  let html = "";
  for (const [cat, items] of Object.entries(groups)) {
    html += `<div class="category-header">${cat}</div>`;
    items.forEach(({ name, emoji, data }) => {
      html += `
      <div class="asset-row">
        <div class="asset-emoji">${emoji}</div>
        <div>
          <div class="asset-name">${name}</div>
          <div class="asset-price">${data ? formatPrice(data.current, data.currency) : "N/D"}</div>
        </div>
        <div class="asset-pcts">
          <span class="pct-day ${cls(data?.dayPct ?? null)}">${data ? (data.dayPct > 0 ? "▲ +" : data.dayPct < 0 ? "▼ " : "→ ") + Math.abs(data.dayPct).toFixed(2) + "%" : "–"}</span>
          <span class="pct-sub">${arrow(data?.weekPct ?? null, "7d")} &nbsp; ${arrow(data?.monthPct ?? null, "30d")}</span>
        </div>
      </div>`;
    });
  }
  document.getElementById("market-table").innerHTML = html;

  const upCount   = results.filter(r => r?.dayPct > 0).length;
  const downCount = results.filter(r => r?.dayPct < 0).length;
  const total = upCount + downCount || 1;
  const mood  = upCount > downCount ? "prevalentemente positiva" : upCount < downCount ? "in calo generalizzato" : "mista";
  const el = document.getElementById("commentary-text");
  if (!el.dataset.ai) {
    el.textContent = `Sessione ${mood}: ${upCount}/${total} asset in rialzo oggi. Commento AI dettagliato disponibile nell'email del report.`;
  }
}

(async () => {
  const results = await Promise.all(ASSETS.map(a => fetchQuote(a.symbol)));
  render(results);
})();
</script>
</body>
</html>
