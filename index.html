<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="900">
<title>Market Pulse</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f3; font-family: Arial, sans-serif; min-height: 100vh; }
  .container { max-width: 560px; margin: 0 auto; padding: 16px 16px 48px; }
  .header { background: #fff; border-bottom: 3px solid #b8860b; padding: 18px 20px 14px; margin-bottom: 3px; }
  .header-tag { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 3px; color: #b8860b; text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 20px; font-weight: 600; color: #111; }
  .header-date { font-family: 'Courier New', monospace; font-size: 11px; color: #888; margin-top: 3px; }
  .market-section { background: #fff; margin-bottom: 3px; padding: 0 12px 8px; }
  .category-header { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #888; padding: 14px 8px 5px; border-bottom: 1px solid #ddd; }
  .asset-row { display: grid; grid-template-columns: 30px minmax(0,1fr) auto; align-items: center; gap: 8px; padding: 13px 8px; border-bottom: 1px solid #eee; }
  .asset-row:last-child { border-bottom: none; }
  .asset-emoji { font-size: 18px; text-align: center; line-height: 1; }
  .asset-name { font-size: 14px; font-weight: 600; color: #111111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-price { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 600; color: #111111; margin-top: 3px; }
  .asset-pcts { text-align: right; }
  .pct-day { font-size: 17px; font-weight: 600; display: block; line-height: 1.2; white-space: nowrap; }
  .pct-sub { font-family: 'Courier New', monospace; font-size: 11px; display: block; margin-top: 3px; white-space: nowrap; color: #888; }
  .up   { color: #1a7a4a; }
  .down { color: #c0392b; }
  .flat { color: #888; }
  .commentary { background: #fffdf5; border-left: 3px solid #b8860b; padding: 16px 18px; margin-bottom: 3px; }
  .commentary-tag { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 2px; color: #b8860b; text-transform: uppercase; margin-bottom: 8px; }
  .commentary-text { font-size: 14px; line-height: 1.7; color: #111; font-style: italic; }
  .legend { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .legend-text { font-family: 'Courier New', monospace; font-size: 10px; color: #aaa; }
  .refresh-btn { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 1px; color: #b8860b; background: none; border: 1px solid #ddd; padding: 5px 12px; cursor: pointer; text-transform: uppercase; }
  .refresh-btn:hover { border-color: #b8860b; }
  .loading { text-align: center; padding: 40px; font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 2px; color: #aaa; }
  @media (max-width: 400px) {
    .asset-row { grid-template-columns: 26px minmax(0,1fr) auto; gap: 5px; }
    .pct-day { font-size: 15px; }
    .pct-sub { font-size: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-tag">◈ Market Pulse</div>
    <div class="header-title" id="session-title">Caricamento…</div>
    <div class="header-date" id="report-date">—</div>
  </div>
  <div class="market-section" id="market-table">
    <div class="loading">CARICAMENTO DATI…</div>
  </div>
  <div class="commentary">
    <div class="commentary-tag">◈ Analisi AI</div>
    <div class="commentary-text" id="commentary-text">
      La web app si aggiorna automaticamente alle 09:30 e alle 15:00 nei giorni feriali.
    </div>
  </div>
  <div class="legend">
    <span class="legend-text">
      <span class="up">▲</span> rialzo &nbsp;|&nbsp;
      <span class="down">▼</span> ribasso &nbsp;|&nbsp;
      fonte: Yahoo Finance
    </span>
    <button class="refresh-btn" onclick="location.reload()">↻ Aggiorna</button>
  </div>
</div>

<script>
const CATEGORY_LABELS = {
  "equity":    "📈 Azioni & ETF",
  "commodity": "🏭 Materie Prime",
  "crypto":    "🔗 Crypto",
  "forex":     "💱 Forex & Macro",
  "bond":      "💱 Forex & Macro",
};

function cls(v) { return v === null || v === undefined ? "flat" : v > 0 ? "up" : v < 0 ? "down" : "flat"; }

function pctArrow(v, label) {
  if (v === null || v === undefined) return `<span class="flat">– <span style="color:#aaa">${label}</span></span>`;
  const a = v > 0 ? "▲" : v < 0 ? "▼" : "→";
  const s = v > 0 ? "+" : "";
  return `<span class="${cls(v)}">${a} ${s}${v.toFixed(2)}%</span> <span style="color:#aaa">${label}</span>`;
}

function formatPrice(val, cur) {
  if (!val && val !== 0) return "N/D";
  const n = parseFloat(val);
  if (isNaN(n)) return "N/D";
  if (n > 1000)  return `${n.toLocaleString("it-IT", {maximumFractionDigits:0})} ${cur}`;
  if (n > 10)    return `${n.toLocaleString("it-IT", {minimumFractionDigits:2, maximumFractionDigits:2})} ${cur}`;
  return `${n.toFixed(4)} ${cur}`;
}

function render(data) {
  // Header
  const session = data.session === "apertura" ? "🌅 Apertura Mercati" : "🌆 Chiusura Mercati";
  document.getElementById("session-title").textContent = session;
  document.getElementById("report-date").textContent = data.generated_at;
  document.getElementById("commentary-text").textContent = data.commentary;

  // Group assets by category
  const groups = {};
  const ORDER = ["equity", "commodity", "crypto", "forex", "bond"];
  data.assets.forEach(a => {
    const label = CATEGORY_LABELS[a.category] || a.category;
    if (!groups[label]) groups[label] = [];
    groups[label].push(a);
  });

  let html = "";
  for (const [cat, items] of Object.entries(groups)) {
    html += `<div class="category-header">${cat}</div>`;
    items.forEach(a => {
      const daySign = a.day_pct > 0 ? "▲ +" : a.day_pct < 0 ? "▼ " : "→ ";
      const dayCls  = cls(a.day_pct);
      html += `
      <div class="asset-row">
        <div class="asset-emoji">${a.emoji}</div>
        <div>
          <div class="asset-name">${a.name}</div>
          <div class="asset-price">${formatPrice(a.current, a.currency)}</div>
        </div>
        <div class="asset-pcts">
          <span class="pct-day ${dayCls}">${a.day_pct !== null ? daySign + Math.abs(a.day_pct).toFixed(2) + "%" : "–"}</span>
          <span class="pct-sub">${pctArrow(a.week_pct, "7d")} &nbsp; ${pctArrow(a.month_pct, "30d")}</span>
        </div>
      </div>`;
    });
  }
  document.getElementById("market-table").innerHTML = html;
}

// Load data.json generated by Python script
fetch(`data.json?t=${Date.now()}`)
  .then(r => { if (!r.ok) throw new Error("data.json not found"); return r.json(); })
  .then(data => render(data))
  .catch(() => {
    document.getElementById("session-title").textContent = "Market Pulse";
    document.getElementById("report-date").textContent = "In attesa del primo report automatico";
    document.getElementById("market-table").innerHTML =
      '<div class="loading">Il report verrà generato automaticamente<br>alle 09:30 e alle 15:00 nei giorni feriali.</div>';
  });
</script>
</body>
</html>
